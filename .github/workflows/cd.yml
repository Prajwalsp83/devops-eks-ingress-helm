name: Full Infra + App Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: praj83/devops-app:latest

  terraform:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Smart Apply — Import if exists, Create if not
        working-directory: terraform
        run: |
          CLUSTER_STATUS=$(aws eks describe-cluster \
            --name devops-cluster \
            --region ap-south-1 \
            --query 'cluster.status' \
            --output text 2>/dev/null || echo "NOT_FOUND")

          echo ">>> Cluster status: $CLUSTER_STATUS"

          if [ "$CLUSTER_STATUS" = "ACTIVE" ]; then
            echo ">>> Cluster EXISTS — cleaning state and re-importing"

            # Remove both from state first (safe if not present)
            terraform state rm 'module.eks.aws_eks_cluster.this[0]' || true
            terraform state rm \
              'module.eks.module.eks_managed_node_group["devops"].aws_eks_node_group.this[0]' || true

            # Import cluster
            terraform import \
              'module.eks.aws_eks_cluster.this[0]' \
              devops-cluster

            # Get actual node group name dynamically
            NODE_GROUP=$(aws eks list-nodegroups \
              --cluster-name devops-cluster \
              --region ap-south-1 \
              --query 'nodegroups[0]' \
              --output text)
            echo ">>> Node group: $NODE_GROUP"

            # Import node group
            terraform import \
              'module.eks.module.eks_managed_node_group["devops"].aws_eks_node_group.this[0]' \
              "devops-cluster:$NODE_GROUP"

            echo ">>> State after import:"
            terraform state list

          else
            echo ">>> Cluster does NOT exist — fresh create"
          fi

          terraform apply -auto-approve

  deploy:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name devops-cluster --region ap-south-1

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller \
            eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=devops-cluster \
            --set serviceAccount.create=true || true

      - name: Deploy App
        run: |
          helm upgrade --install devops-app ./helm-chart \
            --set image.repository=praj83/devops-app \
            --set image.tag=latest
