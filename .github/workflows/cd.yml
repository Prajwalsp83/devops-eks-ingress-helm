name: Full Infra + App Pipeline

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        working-directory: terraform
        run: terraform init   # ← removed -reconfigure, that was wiping state context

      - name: Import EKS cluster if not in state
        working-directory: terraform
        run: |
          terraform state show 'module.eks.aws_eks_cluster.this[0]' > /dev/null 2>&1 \
            || terraform import 'module.eks.aws_eks_cluster.this[0]' devops-cluster

      - name: Import EKS node group if not in state
        working-directory: terraform
        run: |
          terraform state show 'module.eks.module.eks_managed_node_group["devops"].aws_eks_node_group.this[0]' > /dev/null 2>&1 \
            || terraform import \
               'module.eks.module.eks_managed_node_group["devops"].aws_eks_node_group.this[0]' \
               devops-cluster:devops-20260405111716013500000001

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

  deploy:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - nam
