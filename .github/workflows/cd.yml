name: Full Infra + App Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: praj83/devops-app:latest

  terraform:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false   # ← critical: without this, state commands behave oddly

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Show current state
        working-directory: terraform
        run: |
          echo "=== Current state ==="
          terraform state list || echo "State is empty"

      - name: Import EKS Cluster
        working-directory: terraform
        run: |
          if terraform state list | grep -q 'module.eks.aws_eks_cluster.this\[0\]'; then
            echo "Cluster already in state, skipping import"
          else
            echo "Importing cluster..."
            terraform import \
              'module.eks.aws_eks_cluster.this[0]' \
              devops-cluster
          fi

      - name: Import EKS Node Group
        working-directory: terraform
        run: |
          if terraform state list | grep -q 'module.eks.module.eks_managed_node_group\["devops"\].aws_eks_node_group.this\[0\]'; then
            echo "Node group already in state, skipping import"
          else
            echo "Importing node group..."
            terraform import \
              'module.eks.module.eks_managed_node_group["devops"].aws_eks_node_group.this[0]' \
              'devops-cluster:devops-20260405111716013500000001'
          fi

      - name: Show state after import
        working-directory: terraform
        run: |
          echo "=== State after import ==="
          terraform state list

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

  deploy:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name devops-cluster --region ap-south-1

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=devops-cluster \
            --set serviceAccount.create=true || true

      - name: Deploy App
        run: |
          helm upgrade --install devops-app ./helm-chart \
            --set image.repository=praj83/devops-app \
            --set image.tag=latest
